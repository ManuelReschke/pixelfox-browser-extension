<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PixelFox Upload</title>
    <link rel="stylesheet" href="ui.css">
  </head>
  <body class="popup-shell result-shell">
    <header class="app-header">
      <img src="icons/icon32.png" alt="" width="32" height="32">
      <div>
        <h1>PixelFox Upload</h1>
        <p id="phaseText">Preparing upload.</p>
      </div>
    </header>

    <main class="stack">
      <section class="panel preview-panel" aria-labelledby="previewHeading">
        <div class="section-header">
          <h2 id="previewHeading">Preview</h2>
          <button id="editButton" class="secondary-button compact-button" type="button" disabled>
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
            </svg>
            <span>Edit</span>
          </button>
        </div>
        <div class="preview-frame">
          <img id="previewImage" alt="Screenshot preview" hidden>
          <canvas id="editorCanvas" hidden></canvas>
          <p id="previewEmpty" class="empty-text">No screenshot ready.</p>
        </div>
        <div id="editorToolbar" class="editor-toolbar" hidden>
          <button class="tool-button is-active" type="button" data-tool="arrow">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 19 19 5M13 5h6v6"></path>
            </svg>
            <span>Arrow</span>
          </button>
          <button class="tool-button" type="button" data-tool="circle">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="8"></circle>
            </svg>
            <span>Circle</span>
          </button>
          <button class="tool-button" type="button" data-tool="text">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M4 7V4h16v3M9 20h6M12 4v16"></path>
            </svg>
            <span>Text</span>
          </button>
          <button id="zoomOutButton" class="tool-button" type="button">-</button>
          <span id="zoomLabel" class="zoom-label">100%</span>
          <button id="zoomInButton" class="tool-button" type="button">+</button>
          <button id="undoEditButton" class="tool-button" type="button">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M9 14 4 9l5-5M4 9h10a6 6 0 0 1 0 12h-1"></path>
            </svg>
            <span>Undo</span>
          </button>
          <button id="cancelEditButton" class="tool-button" type="button">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18M6 6l12 12"></path>
            </svg>
            <span>Cancel</span>
          </button>
          <button id="saveEditButton" class="tool-button primary-tool-button" type="button">
            <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="m5 12 4 4L19 6"></path>
            </svg>
            <span>Save</span>
          </button>
        </div>
      </section>

      <section class="status-card" aria-live="polite">
        <div id="statusText">Waiting for status.</div>
        <a id="shareLink" class="share-link" href="#" target="_blank" rel="noreferrer" hidden></a>
      </section>

      <div id="resultActions" class="button-row">
        <button id="uploadButton" class="primary-button" type="button" disabled>
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 16V4M7 9l5-5 5 5M5 20h14"></path>
          </svg>
          <span>Upload & Copy Link</span>
        </button>
        <button id="openButton" class="secondary-button" type="button" disabled>
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 3h7v7M10 14 21 3M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"></path>
          </svg>
          <span>Open Link</span>
        </button>
      </div>
    </main>

    <script type="module" src="result.js"></script>
  </body>
</html>
