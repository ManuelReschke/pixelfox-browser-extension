<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PixelFox Uploader</title>
    <link rel="stylesheet" href="ui.css">
  </head>
  <body class="popup-shell">
    <header class="app-header">
      <img src="icons/icon32.png" alt="" width="32" height="32">
      <div>
        <h1>Easy Screenshot by PixelFox.cc</h1>
      </div>
      <button id="settingsButton" class="icon-button header-icon-button" type="button" title="Open settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"></path>
          <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.88-.34 1.7 1.7 0 0 0-1.03 1.56V21a2 2 0 1 1-4 0v-.08a1.7 1.7 0 0 0-1.11-1.56 1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.56-1.03H3a2 2 0 1 1 0-4h.08A1.7 1.7 0 0 0 4.6 8.86a1.7 1.7 0 0 0-.34-1.88l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.88.34H9a1.7 1.7 0 0 0 1-1.56V3a2 2 0 1 1 4 0v.08a1.7 1.7 0 0 0 1.03 1.56 1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.88v.03a1.7 1.7 0 0 0 1.56 1.03H21a2 2 0 1 1 0 4h-.08A1.7 1.7 0 0 0 19.4 15Z"></path>
        </svg>
      </button>
    </header>

    <main class="stack">
      <section class="panel">
        <button id="selectionButton" class="primary-button" type="button">Screenshot (Select area)</button>
        <button id="visibleAreaButton" class="secondary-button" type="button">Screenshot (Visible area)</button>
        <button id="fileButton" class="secondary-button" type="button">Upload file</button>
        <input id="fileInput" type="file" accept="image/png,image/jpeg,image/webp,image/gif,image/avif,image/bmp" hidden>
      </section>

      <section class="panel recent-panel" aria-labelledby="recentUploadsHeading">
        <div class="section-header">
          <h2 id="recentUploadsHeading">Recent uploads</h2>
        </div>
        <p id="uploadStatus" class="inline-status" aria-live="polite" hidden></p>
        <ul id="recentUploadsList" class="recent-list"></ul>
        <p id="emptyRecentUploads" class="empty-text">No uploads yet.</p>
      </section>

      <section id="premiumPromo" class="panel premium-promo" aria-labelledby="premiumPromoHeading" hidden>
        <div class="promo-copy">
          <span class="promo-badge">Free plan</span>
          <h2 id="premiumPromoHeading">Need more room for screenshots?</h2>
          <p>Premium adds more storage, larger uploads, and extra headroom when PixelFox becomes part of your daily workflow.</p>
        </div>
        <a class="promo-link" href="https://pixelfox.cc/pricing" target="_blank" rel="noreferrer">View plans</a>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
