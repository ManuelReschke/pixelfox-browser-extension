<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PixelFox Settings</title>
    <link rel="stylesheet" href="ui.css">
  </head>
  <body class="options-shell">
    <main class="settings-layout">
      <header class="app-header wide">
        <img src="icons/icon48.png" alt="" width="48" height="48">
        <div>
          <h1>PixelFox Settings</h1>
          <p>API access and upload defaults for the extension.</p>
        </div>
      </header>

      <form id="settingsForm" class="settings-form">
        <section class="panel">
          <label class="field">
            <span>API key</span>
            <input id="apiKeyInput" type="password" autocomplete="off" spellcheck="false" placeholder="Paste PixelFox API key">
          </label>
          <div class="meta-row">
            <span id="savedKeyState">No API key saved.</span>
            <button id="deleteKeyButton" class="link-button inline" type="button">Delete key</button>
          </div>
        </section>

        <section class="panel">
          <label class="field">
            <span>PixelFox base URL</span>
            <select id="baseUrlInput">
              <option value="https://pixelfox.cc">https://pixelfox.cc</option>
              <option value="http://localhost:8080">http://localhost:8080</option>
              <option value="http://127.0.0.1:8080">http://127.0.0.1:8080</option>
            </select>
          </label>

          <label class="checkbox-field">
            <input id="nsfwInput" type="checkbox">
            <span>Mark uploads as NSFW</span>
          </label>

          <label class="field">
            <span>Processing</span>
            <select id="processingInput">
              <option value="original_only">Upload original only</option>
              <option value="default">Use PixelFox default</option>
            </select>
          </label>

          <label class="field">
            <span>Album ID optional</span>
            <input id="albumIdInput" type="number" min="1" step="1" inputmode="numeric" placeholder="e.g. 7">
          </label>
        </section>

        <section class="status-card" aria-live="polite">
          <div id="statusText">Ready.</div>
        </section>

        <div class="button-row">
          <button id="saveButton" class="primary-button" type="submit">Save</button>
          <button id="validateButton" class="secondary-button" type="button">Check API key</button>
        </div>
      </form>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
